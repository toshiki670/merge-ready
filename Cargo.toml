[package]
name = "merge-ready"
version = "0.1.0"
edition = "2024"

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
pedantic = "warn"

[dependencies]
clap = { version = "4", features = ["derive", "cargo"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[[test]]
name = "e2e"
path = "tests/e2e/mod.rs"

[dev-dependencies]
assert_cmd = "2"
criterion = { version = "0.5", features = ["html_reports"] }
predicates = "3"
tempfile = "3"

[[bench]]
name = "hot_path"
harness = false
