[package]
name = "merge-ready"
version = "0.1.0"
edition = "2024"
description = "Show pull request merge blockers as concise prompt tokens"
license = "MIT"
repository = "https://github.com/toshiki670/merge-ready"
homepage = "https://github.com/toshiki670/merge-ready"
readme = "README.md"
keywords = ["pull-request", "cli", "prompt", "developer-tools", "merge"]
categories = ["command-line-utilities", "development-tools"]

[lints.rust]
unsafe_code = "forbid"

[lints.clippy]
pedantic = "warn"

[dependencies]
clap = { version = "4", features = ["derive", "cargo"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[[test]]
name = "e2e"
path = "tests/e2e/mod.rs"

[dev-dependencies]
assert_cmd = "2"
criterion = { version = "0.8", features = ["html_reports"] }
predicates = "3"
tempfile = "3"

[[bench]]
name = "hot_path"
harness = false
